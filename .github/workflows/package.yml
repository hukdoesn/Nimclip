name: 打包 Nimclip

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: package-${{ github.ref }}
  cancel-in-progress: true

jobs:
  package:
    name: ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Apple Silicon
            arch: arm64
            runner: macos-15
          - name: Intel
            arch: x86_64
            runner: macos-15-intel

    runs-on: ${{ matrix.runner }}

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 选择 Xcode 26.3
        run: |
          sudo xcode-select --switch /Applications/Xcode_26.3.app/Contents/Developer
          xcodebuild -version

      - name: 构建并打包
        run: ./package.sh "${{ matrix.arch }}"

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: Nimclip-macOS-${{ matrix.arch }}
          path: |
            dist/Nimclip-macOS-${{ matrix.arch }}.zip
            dist/Nimclip-macOS-${{ matrix.arch }}.zip.sha256
          if-no-files-found: error
          retention-days: 14

  release:
    name: 发布安装包
    if: startsWith(github.ref, 'refs/tags/v')
    needs: package
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 检出发布历史
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: 下载全部安装包
        uses: actions/download-artifact@v4
        with:
          pattern: Nimclip-macOS-*
          path: dist
          merge-multiple: true

      - name: 生成本次更新说明
        env:
          GH_REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          PREVIOUS_TAG="$(git describe --tags --abbrev=0 "$TAG^" 2>/dev/null || true)"

          if [ -n "$PREVIOUS_TAG" ]; then
            COMMIT_RANGE="$PREVIOUS_TAG..$TAG"
          else
            COMMIT_RANGE="$TAG"
          fi

          {
            echo "## 本次更新"
            echo

            if git log "$COMMIT_RANGE" --no-merges --format='%H%x09%s' |
              grep -q .; then
              while IFS=$'\t' read -r SHA SUBJECT; do
                SHORT_SHA="${SHA:0:7}"
                printf -- '- %s ([`%s`](https://github.com/%s/commit/%s))\n' \
                  "$SUBJECT" "$SHORT_SHA" "$GH_REPO" "$SHA"
              done < <(
                git log "$COMMIT_RANGE" --no-merges --format='%H%x09%s'
              )
            else
              echo "- 发布 $TAG"
            fi

            echo
            echo "## 安装包"
            echo
            echo "- Apple Silicon：\`Nimclip-macOS-arm64.zip\`"
            echo "- Intel：\`Nimclip-macOS-x86_64.zip\`"
            echo "- 每个安装包均附带对应的 SHA-256 校验文件"

            if [ -n "$PREVIOUS_TAG" ]; then
              echo
              echo "**完整变更记录**：https://github.com/$GH_REPO/compare/$PREVIOUS_TAG...$TAG"
            fi
          } > release-notes.md

          cat release-notes.md

      - name: 创建或更新 GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          if gh release view "$TAG" --repo "$GH_REPO" >/dev/null 2>&1; then
            gh release edit "$TAG" \
              --repo "$GH_REPO" \
              --title "Nimclip $TAG" \
              --notes-file release-notes.md
            gh release upload "$TAG" dist/* --repo "$GH_REPO" --clobber
          else
            gh release create "$TAG" dist/* \
              --repo "$GH_REPO" \
              --title "Nimclip $TAG" \
              --notes-file release-notes.md
          fi
